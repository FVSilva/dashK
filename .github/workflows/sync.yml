name: Sync Kommo Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes automatically
  workflow_dispatch:           # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Kommo data
        run: node scripts/sync.js
        env:
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_TOKEN: ${{ secrets.KOMMO_TOKEN }}

      # Push ONLY data.json directly into the gh-pages branch.
      # keep_files: true preserves all the app files already deployed there.
      # No full rebuild needed — just updates the one JSON file.
      - name: Publish data.json to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
          commit_message: "sync: update Kommo data"
