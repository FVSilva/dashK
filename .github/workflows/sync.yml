name: Sync Kommo Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes automatically
  workflow_dispatch:           # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Kommo data
        run: node scripts/sync.js
        env:
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_TOKEN: ${{ secrets.KOMMO_TOKEN }}

      - name: Commit & push data.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: sync Kommo data [skip ci]"
          git push
